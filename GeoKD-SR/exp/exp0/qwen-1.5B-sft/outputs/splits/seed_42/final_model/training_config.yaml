experiment:
  name: qwen-1.5b-sft-24gb
  seed: 42
  type: exp1_direct_sft
model:
  lora:
    alpha: 32
    dropout: 0.05
    r: 16
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  name: Qwen2.5-1.5B-Instruct
  path: /mnt/workspace/30_keyan/GeoKD-SR/models/Qwen2.5-1.5B-Instruct/Qwen/Qwen2___5-1___5B-Instruct
  use_lora: true
optimization:
  gradient_checkpointing: true
  max_length: 1024
  mixed_precision: bf16
training:
  batch_size: 8
  gradient_accumulation_steps: 16
  learning_rate: 5.0e-05
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  num_epochs: 3
  warmup_ratio: 0.1
  weight_decay: 0.01
