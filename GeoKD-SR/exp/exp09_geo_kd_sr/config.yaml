# 实验配置 - Exp9: GeoKD-SR(Full)（完整方法）
# 结合所有组件：空间关系蒸馏 + 思维链 + 逆向KL + 自蒸馏 + 注意力 + 渐进式

experiment:
  name: "exp09_geo_kd_sr"
  description: "GeoKD-SR完整方法：结合所有蒸馏组件"
  seed: 42

model:
  teacher:
    enabled: true
    name: "Qwen/Qwen2.5-7B-Instruct"
    quantization: "4bit"
    device_map: "auto"
    self_distillation:
      enabled: true
      use_ema: true
      ema_decay: 0.999

  student:
    name: "Qwen/Qwen2.5-1.5B-Instruct"
    lora:
      r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
      bias: "none"
      task_type: "CAUSAL_LM"

training:
  learning_rate: 1e-4
  batch_size: 8
  gradient_accumulation_steps: 16
  num_epochs: 3
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500
  eval_steps: 500

distillation:
  enabled: true
  method: "geo_kd_sr_full"
  temperature: 2.0
  alpha: 0.5

  # 组件权重配置
  components:
    # C1: 空间关系蒸馏（核心创新）
    spatial_relation:
      enabled: true
      weight_type: "learnable"
      initial_weights:
        directional: 1.5
        topological: 1.3
        metric: 1.0
        composite: 1.8
      weight_lr: 0.01
      loss_weight: 0.3

    # C2: 思维链蒸馏
    chain_of_thought:
      enabled: true
      alpha: 0.6
      normalize_by_steps: true
      loss_weight: 0.2

    # C3: 逆向KL蒸馏
    reverse_kl:
      enabled: true
      forward_weight: 0.3
      reverse_weight: 0.7
      loss_weight: 0.2

    # C4: 自蒸馏
    self_distillation:
      enabled: true
      self_weight: 0.3
      teacher_weight: 0.7
      loss_weight: 0.1

    # C5: 注意力蒸馏
    attention:
      enabled: true
      attention_weight: 0.3
      hidden_weight: 0.2
      loss_weight: 0.1

    # C6: 渐进式蒸馏
    progressive:
      enabled: true
      stages:
        - name: "warmup"
          epochs: [0, 1]
          temperature_multiplier: 1.5
        - name: "main"
          epochs: [1, 2]
          temperature_multiplier: 1.0
        - name: "finetune"
          epochs: [2, 3]
          temperature_multiplier: 0.75

data:
  train_path: "data/geosr_chain/final/train.jsonl"
  dev_path: "data/geosr_chain/final/dev.jsonl"
  test_path: "data/geosr_chain/final/test.jsonl"
  max_length: 2048

output:
  checkpoint_dir: "checkpoints/"
  log_dir: "logs/"
  result_dir: "results/"
