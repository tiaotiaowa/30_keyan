# 实验配置 - Exp3a: B2+C1(Uniform)（空间关系蒸馏等权重基线）
# 等权重空间关系蒸馏损失

experiment:
  name: "exp03a_uniform_srd"
  description: "空间关系蒸馏等权重基线：所有关系类型使用相同权重"
  seed: 42

model:
  teacher:
    enabled: true
    name: "Qwen/Qwen2.5-7B-Instruct"
    quantization: "4bit"
    device_map: "auto"

  student:
    name: "Qwen/Qwen2.5-1.5B-Instruct"
    lora:
      r: 8
      lora_alpha: 16
      lora_dropout: 0.05
      target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
      bias: "none"
      task_type: "CAUSAL_LM"

training:
  learning_rate: 1e-4
  batch_size: 8
  gradient_accumulation_steps: 16
  num_epochs: 3
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 500
  eval_steps: 500

distillation:
  enabled: true
  method: "spatial_relation_uniform"
  temperature: 2.0
  alpha: 0.5
  spatial_relation:
    # 等权重设置
    weight_type: "uniform"
    weights:
      directional: 1.0
      topological: 1.0
      metric: 1.0
      composite: 1.0

data:
  train_path: "data/geosr_chain/final/train.jsonl"
  dev_path: "data/geosr_chain/final/dev.jsonl"
  test_path: "data/geosr_chain/final/test.jsonl"
  max_length: 2048

output:
  checkpoint_dir: "checkpoints/"
  log_dir: "logs/"
  result_dir: "results/"
